<!DOCTYPE html>
<html lang="ko" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow Pro</title>

  <!-- 테마 깜빡임 방지: HTML 클래스 선적용 -->
  <script>
    (function () {
      const t = localStorage.getItem('theme')
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      }
    })()
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>

<body class="min-h-screen bg-gray-100 dark:bg-zinc-900 font-sans transition-colors duration-200">

  <!-- 헤더 -->
  <header class="sticky top-0 z-40 bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md border-b border-gray-200 dark:border-zinc-700">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-base font-semibold text-gray-900 dark:text-white tracking-tight">TaskFlow Pro</h1>
      <button
        id="themeToggle"
        class="min-h-[44px] min-w-[44px] flex items-center justify-center rounded-xl text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-zinc-700 transition-all duration-150"
        aria-label="테마 전환"
      >
        <span id="themeIcon" class="text-lg select-none">🌙</span>
      </button>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-5">

    <!-- 태스크 추가 폼 -->
    <section class="bg-white/70 dark:bg-zinc-800/70 backdrop-blur-md rounded-xl shadow-lg p-5">
      <p class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide mb-4">새 태스크</p>
      <form id="addForm" class="space-y-3">
        <input
          id="addTitle"
          type="text"
          maxlength="200"
          placeholder="제목 *"
          autocomplete="off"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-200 dark:border-zinc-600 bg-white dark:bg-zinc-700 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-150"
        >
        <div class="flex flex-col sm:flex-row gap-3">
          <input
            id="addDueAt"
            type="datetime-local"
            class="flex-1 px-4 py-2.5 rounded-lg border border-gray-200 dark:border-zinc-600 bg-white dark:bg-zinc-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-150"
          >
          <select
            id="addStatus"
            class="flex-1 px-4 py-2.5 rounded-lg border border-gray-200 dark:border-zinc-600 bg-white dark:bg-zinc-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-150"
          >
            <option value="todo">📋 할 일</option>
            <option value="in_progress">🔵 진행 중</option>
            <option value="done">✅ 완료</option>
          </select>
        </div>
        <button
          id="addBtn"
          type="submit"
          disabled
          class="w-full min-h-[44px] px-4 py-2.5 rounded-lg bg-blue-500 text-white text-sm font-medium disabled:opacity-40 disabled:cursor-not-allowed hover:bg-blue-600 active:scale-[0.98] transition-all duration-150"
        >
          추가
        </button>
      </form>
    </section>

    <!-- 태스크 목록 -->
    <section>
      <div class="flex items-center justify-between mb-3 px-1">
        <p class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide">태스크 목록</p>
        <span id="taskCount" class="text-xs text-gray-400 dark:text-gray-500"></span>
      </div>

      <!-- 빈 상태 -->
      <div id="emptyState" class="hidden text-center py-16">
        <p class="text-3xl mb-2">📭</p>
        <p class="text-sm text-gray-400 dark:text-gray-500">아직 태스크가 없습니다</p>
      </div>

      <!-- 카드 목록 -->
      <div id="taskList" class="space-y-3"></div>
    </section>

  </main>

  <!-- 수정 모달 -->
  <div id="editModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div id="modalBackdrop" class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>
    <div class="relative w-full sm:max-w-md bg-white dark:bg-zinc-800 rounded-t-2xl sm:rounded-xl shadow-2xl p-6 space-y-4">
      <p class="text-base font-semibold text-gray-900 dark:text-white">태스크 수정</p>
      <input
        id="editTitle"
        type="text"
        maxlength="200"
        placeholder="제목 *"
        class="w-full px-4 py-2.5 rounded-lg border border-gray-200 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-700 text-gray-900 dark:text-white placeholder-gray-400 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-150"
      >
      <textarea
        id="editDescription"
        rows="3"
        placeholder="설명 (선택)"
        class="w-full px-4 py-2.5 rounded-lg border border-gray-200 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-700 text-gray-900 dark:text-white placeholder-gray-400 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none transition-all duration-150"
      ></textarea>
      <div class="flex flex-col sm:flex-row gap-3">
        <input
          id="editDueAt"
          type="datetime-local"
          class="flex-1 px-4 py-2.5 rounded-lg border border-gray-200 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-150"
        >
        <select
          id="editStatus"
          class="flex-1 px-4 py-2.5 rounded-lg border border-gray-200 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-150"
        >
          <option value="todo">📋 할 일</option>
          <option value="in_progress">🔵 진행 중</option>
          <option value="done">✅ 완료</option>
        </select>
      </div>
      <div class="flex gap-3 pt-1">
        <button
          id="editCancelBtn"
          class="flex-1 min-h-[44px] rounded-lg border border-gray-200 dark:border-zinc-600 text-gray-700 dark:text-gray-300 text-sm hover:bg-gray-50 dark:hover:bg-zinc-700 transition-all duration-150"
        >취소</button>
        <button
          id="editSaveBtn"
          class="flex-1 min-h-[44px] rounded-lg bg-blue-500 text-white text-sm font-medium hover:bg-blue-600 active:scale-[0.98] disabled:opacity-40 transition-all duration-150"
        >저장</button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 다이얼로그 -->
  <div id="deleteDialog" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>
    <div class="relative w-full max-w-sm bg-white dark:bg-zinc-800 rounded-xl shadow-2xl p-6 space-y-4">
      <p class="text-base font-semibold text-gray-900 dark:text-white">태스크 삭제</p>
      <p class="text-sm text-gray-500 dark:text-gray-400">이 태스크를 삭제할까요?<br>되돌릴 수 없습니다.</p>
      <div class="flex gap-3 pt-1">
        <button
          id="deleteCancelBtn"
          class="flex-1 min-h-[44px] rounded-lg border border-gray-200 dark:border-zinc-600 text-gray-700 dark:text-gray-300 text-sm hover:bg-gray-50 dark:hover:bg-zinc-700 transition-all duration-150"
        >취소</button>
        <button
          id="deleteConfirmBtn"
          class="flex-1 min-h-[44px] rounded-lg bg-red-500 text-white text-sm font-medium hover:bg-red-600 active:scale-[0.98] disabled:opacity-40 transition-all duration-150"
        >삭제</button>
      </div>
    </div>
  </div>

  <script>
    // ===== 상수 =====
    const API = 'http://127.0.0.1:8000/api/tasks'
    const POLL_INTERVAL_MS = 3000

    // ===== 상태 (모듈 변수) =====
    let tasks = []
    let pollingTimer = null
    let editingTaskId = null
    let deletingTaskId = null

    // ===== 테마 =====
    function updateThemeIcon() {
      const isDark = document.documentElement.classList.contains('dark')
      document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙'
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark')
      localStorage.setItem('theme', isDark ? 'dark' : 'light')
      updateThemeIcon()
    }

    // ===== API =====
    async function apiFetch(path, options = {}) {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      })
      if (res.status === 204) return null
      if (!res.ok) {
        const err = await res.json().catch(() => ({}))
        throw new Error(err.detail || `HTTP ${res.status}`)
      }
      return res.json()
    }

    const fetchTasks  = ()         => apiFetch('')
    const fetchTask   = id         => apiFetch(`/${id}`)
    const createTask  = data       => apiFetch('', { method: 'POST', body: JSON.stringify(data) })
    const updateTask  = (id, data) => apiFetch(`/${id}`, { method: 'PUT', body: JSON.stringify(data) })
    const deleteTask  = id         => apiFetch(`/${id}`, { method: 'DELETE' })

    // ===== 날짜 유틸 =====
    function formatDueAt(isoStr) {
      if (!isoStr) return null
      const due = new Date(isoStr)
      const now  = new Date()
      const diffMs   = due - now
      const diffDays = Math.floor(Math.abs(diffMs) / 86400000)
      const h = String(due.getHours()).padStart(2, '0')
      const m = String(due.getMinutes()).padStart(2, '0')
      const time = `${h}:${m}`

      // 마감 초과
      if (diffMs < 0) return { text: `D+${diffDays} ${time}`, cls: 'text-red-500 line-through' }
      // 1시간 미만
      if (diffMs < 3600000) return { text: `D-0 ${time}`, cls: 'text-red-500 font-semibold' }
      // 24시간 미만
      if (diffMs < 86400000) return { text: `D-0 ${time}`, cls: 'text-orange-500 font-semibold' }
      // 이상
      return { text: `D-${diffDays} ${time}`, cls: 'text-gray-400 dark:text-gray-500' }
    }

    function localToISO(val) {
      return val ? new Date(val).toISOString() : null
    }

    function isoToLocal(iso) {
      if (!iso) return ''
      const d = new Date(iso)
      const p = n => String(n).padStart(2, '0')
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`
    }

    // ===== 렌더 =====
    const BADGE = {
      todo:        '<span class="px-2 py-0.5 rounded-md text-xs font-medium bg-gray-100 dark:bg-zinc-700 text-gray-500 dark:text-gray-400">할 일</span>',
      in_progress: '<span class="px-2 py-0.5 rounded-md text-xs font-medium bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-300">진행 중</span>',
      done:        '<span class="px-2 py-0.5 rounded-md text-xs font-medium bg-green-100 dark:bg-green-900/40 text-green-600 dark:text-green-300">완료</span>',
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    function renderTaskList() {
      const list   = document.getElementById('taskList')
      const empty  = document.getElementById('emptyState')
      const count  = document.getElementById('taskCount')

      count.textContent = tasks.length ? `총 ${tasks.length}개` : ''

      if (!tasks.length) {
        list.innerHTML = ''
        empty.classList.remove('hidden')
        return
      }
      empty.classList.add('hidden')

      list.innerHTML = tasks.map(t => {
        const due = formatDueAt(t.due_at)
        return `
          <div class="group relative bg-white/70 dark:bg-zinc-800/70 backdrop-blur-md rounded-xl shadow-lg p-4 cursor-pointer hover:shadow-xl active:scale-[0.99] transition-all duration-150 task-card" data-id="${t.id}">
            <div class="pr-10">
              <p class="text-sm font-medium text-gray-900 dark:text-white truncate">${esc(t.title)}</p>
              <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                ${BADGE[t.status]}
                ${due ? `<span class="text-xs ${due.cls}">${due.text}</span>` : ''}
              </div>
            </div>
            <!-- 휴지통: 모바일은 항상 표시, 데스크톱은 hover시 표시 -->
            <button
              class="delete-btn absolute top-1/2 -translate-y-1/2 right-3 min-h-[44px] min-w-[44px] flex items-center justify-center rounded-lg text-gray-300 dark:text-zinc-600 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 sm:opacity-0 sm:group-hover:opacity-100 transition-all duration-150"
              data-id="${t.id}"
              aria-label="삭제"
            >🗑️</button>
          </div>`
      }).join('')
    }

    // ===== 폴링 =====
    async function loadTasks() {
      try {
        tasks = await fetchTasks()
        renderTaskList()
      } catch (e) {
        console.error('목록 로드 실패:', e)
      }
    }

    function startPolling() {
      loadTasks()
      pollingTimer = setInterval(loadTasks, POLL_INTERVAL_MS)
    }

    // ===== 수정 모달 =====
    async function openEditModal(id) {
      editingTaskId = id
      try {
        const t = await fetchTask(id)
        document.getElementById('editTitle').value       = t.title
        document.getElementById('editDescription').value = t.description || ''
        document.getElementById('editStatus').value      = t.status
        document.getElementById('editDueAt').value       = isoToLocal(t.due_at)
        document.getElementById('editModal').classList.remove('hidden')
        document.getElementById('editTitle').focus()
      } catch {
        alert('태스크를 불러오지 못했습니다.')
      }
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.add('hidden')
      editingTaskId = null
    }

    async function saveEdit() {
      const title = document.getElementById('editTitle').value.trim()
      if (!title) return

      const btn = document.getElementById('editSaveBtn')
      btn.disabled = true
      btn.textContent = '저장 중...'

      try {
        const updated = await updateTask(editingTaskId, {
          title,
          description: document.getElementById('editDescription').value || null,
          status:      document.getElementById('editStatus').value,
          due_at:      localToISO(document.getElementById('editDueAt').value),
        })
        // 낙관적 갱신 — 목록에서 해당 카드 즉시 교체
        tasks = tasks.map(t => t.id === updated.id ? updated : t)
        renderTaskList()
        closeEditModal()
      } catch (e) {
        alert(`수정 실패: ${e.message}`)
      } finally {
        btn.disabled = false
        btn.textContent = '저장'
      }
    }

    // ===== 삭제 다이얼로그 =====
    function openDeleteDialog(id) {
      deletingTaskId = id
      document.getElementById('deleteDialog').classList.remove('hidden')
    }

    function closeDeleteDialog() {
      document.getElementById('deleteDialog').classList.add('hidden')
      deletingTaskId = null
    }

    async function confirmDelete() {
      const btn = document.getElementById('deleteConfirmBtn')
      btn.disabled = true
      btn.textContent = '삭제 중...'

      try {
        await deleteTask(deletingTaskId)
        tasks = tasks.filter(t => t.id !== deletingTaskId)
        renderTaskList()
        closeDeleteDialog()
      } catch (e) {
        alert(`삭제 실패: ${e.message}`)
      } finally {
        btn.disabled = false
        btn.textContent = '삭제'
      }
    }

    // ===== 이벤트 바인딩 =====
    document.getElementById('themeToggle').addEventListener('click', toggleTheme)

    // 추가 폼 — title 비어있으면 버튼 비활성화
    const addTitleEl = document.getElementById('addTitle')
    const addBtnEl   = document.getElementById('addBtn')
    addTitleEl.addEventListener('input', () => {
      addBtnEl.disabled = !addTitleEl.value.trim()
    })

    document.getElementById('addForm').addEventListener('submit', async e => {
      e.preventDefault()
      const title = addTitleEl.value.trim()
      if (!title) return

      addBtnEl.disabled = true
      addBtnEl.textContent = '추가 중...'

      try {
        const task = await createTask({
          title,
          status: document.getElementById('addStatus').value,
          due_at: localToISO(document.getElementById('addDueAt').value),
        })
        // 낙관적 갱신 — 목록 상단에 추가
        tasks = [task, ...tasks]
        renderTaskList()
        document.getElementById('addForm').reset()
        addBtnEl.disabled = true
      } catch (e) {
        alert(`추가 실패: ${e.message}`)
        addBtnEl.disabled = false
      } finally {
        addBtnEl.textContent = '추가'
      }
    })

    // 목록 이벤트 위임
    document.getElementById('taskList').addEventListener('click', e => {
      const deleteBtn = e.target.closest('.delete-btn')
      if (deleteBtn) {
        e.stopPropagation()
        openDeleteDialog(Number(deleteBtn.dataset.id))
        return
      }
      const card = e.target.closest('.task-card')
      if (card) openEditModal(Number(card.dataset.id))
    })

    // 수정 모달
    document.getElementById('editSaveBtn').addEventListener('click', saveEdit)
    document.getElementById('editCancelBtn').addEventListener('click', closeEditModal)
    document.getElementById('modalBackdrop').addEventListener('click', closeEditModal)

    // 삭제 다이얼로그
    document.getElementById('deleteConfirmBtn').addEventListener('click', confirmDelete)
    document.getElementById('deleteCancelBtn').addEventListener('click', closeDeleteDialog)

    // ESC 키
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return
      closeEditModal()
      closeDeleteDialog()
    })

    // ===== 초기화 =====
    updateThemeIcon()
    startPolling()
  </script>
</body>
</html>
